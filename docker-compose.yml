version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: mt-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mt-network

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: mt-ml-service
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mt-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: mt-api-gateway
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      ML_SERVICE_URL: ${ML_SERVICE_URL}
      SERVER_PORT: ${SERVER_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    networks:
      - mt-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mt-frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - mt-network

networks:
  mt-network:
    driver: bridge

volumes:
  postgres_data: